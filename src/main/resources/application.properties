spring.application.name=bff-service
server.port=8086

# URLs de los microservicios (sobreescritas por variables de entorno en Docker)
bff.services.usuario-url=http://localhost:8084
bff.services.inventario-url=http://localhost:8081

# CORS: orígenes permitidos (frontend local + Docker)
bff.cors.allowed-origins=http://localhost,http://localhost:5173,http://localhost:80

# Actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
